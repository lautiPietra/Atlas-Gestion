[build]
  command = "node scripts/build-env.js"
  publish = "."

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "ATLAS_API_URL"

# Redireccion limpia de /demo
[[redirects]]
  from   = "/demo"
  to     = "/demo.html"
  status = 200

# ── Headers de seguridad globales ────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co https://pietracloud.com.ar; img-src 'self' data:; font-src 'self' data:; frame-ancestors 'none'"

